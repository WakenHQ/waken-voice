name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.12' }}
      - name: Install system audio library
        # sounddevice wraps PortAudio via a compiled extension — it needs
        # the shared library present on the OS, not just the pip package.
        run: sudo apt-get update && sudo apt-get install -y libportaudio2
      - name: Install
        run: |
          pip install -e ".[dev]"
          # openwakeword unconditionally depends on tflite-runtime on Linux,
          # which has no wheel for this Python version; --no-deps skips that
          # (its actual runtime deps are already covered by the dev extra).
          # See the README's Install section for the full explanation.
          pip install --no-deps openwakeword
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy waken_voice
      - name: Test
        run: pytest
